[build]
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"
  # pdfkit reads its built-in .afm font-metric files from disk at runtime, so it
  # must ship as a whole package rather than be bundled by esbuild.
  external_node_modules = ["pg", "pdfkit"]

[dev]
  framework = "vite"

[[redirects]]
from = "/api/*"
to   = "/.netlify/functions/:splat"
status = 200

[[redirects]]
from = "/*"
to   = "/index.html"
status = 200
